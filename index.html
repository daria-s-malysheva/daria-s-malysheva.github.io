<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daria Malysheva — Professional photographer — Daria Malysheva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --text:rgba(0,0,0,0.75); --text-muted:rgba(0,0,0,0.40); --gap:8px; --header-h:52px; }
    html { font-size:62.5%; }
    body { font-family:'Space Grotesk', 'Helvetica Neue', Arial, sans-serif; background:#fff; color:var(--text); font-size:1.4rem; letter-spacing:0.02em; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    a:hover { opacity:0.5; transition:opacity 0.15s; }
    header { position:fixed; top:0; left:0; right:0; height:var(--header-h); z-index:200; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0 2.4rem; background:rgba(255,255,255,0.97); }
    .header-name { font-size:1.4rem; font-weight:500; }
    .header-nav { display:flex; gap:2.8rem; font-size:1.4rem; }
    .header-nav a.active, .header-right a.active { opacity:0.4; pointer-events:none; }
    .header-right { display:flex; justify-content:flex-end; gap:2.8rem; font-size:1.4rem; }
    footer { text-align:center; padding:3.5rem 2rem; font-size:1.2rem; color:var(--text-muted); }
    @media (max-width:600px) { header { grid-template-columns:1fr 1fr; } .header-nav { display:none; } }

    main { padding-top:var(--header-h); }
    .grid { column-count:3; column-gap:var(--gap); padding:var(--gap) var(--gap) 0; }
    .grid-item { break-inside:avoid; margin-bottom:var(--gap); position:relative; overflow:hidden; }
    .grid-item a { display:block; }
    .grid-item img { width:100%; height:auto; display:block; transition:opacity 0.2s ease; }
    .grid-item a:hover img { opacity:0.88; }
    .project-title { position:absolute; bottom:0; left:0; right:0; padding:1rem 1.2rem; font-size:1.1rem; letter-spacing:0.06em; text-transform:uppercase; color:rgba(0,0,0,0.7); background:rgba(255,255,255,0.92); opacity:0; transition:opacity 0.15s ease; pointer-events:none; }
    .grid-item a:hover .project-title { opacity:1; }
    @media (max-width:900px) { .grid { column-count:2; } }
    @media (max-width:600px) { .grid { column-count:1; } }
  </style>
</head>
